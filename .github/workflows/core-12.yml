name: "TYPO3 v12"

# TYPO3 v12 support has been removed with version 2.0.0 and is only maintained
# in the 1.x releases from branch `1`. This workflow is kept in a disabled state
# on `main` instead of being removed, keeping the branch based workflow set
# comparable and the badges of the branches still supporting TYPO3 v12 intact.

on:
  workflow_dispatch:

jobs:

  disabled:
    name: "dummy v12 (disabled, TYPO3 v12 support removed)"
    runs-on: ubuntu-latest
    steps:

      - name: "Checkout"
        uses: actions/checkout@v6
